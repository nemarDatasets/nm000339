methodology: 'Participants completed 7-11 online BCI training sessions. Each session consisted of 450 trials across 3 tasks
  (LR, UD, 2D) with 6 runs total. Each trial: 2s inter-trial interval, 2s target presentation, up to 6s feedback control.
  Online control used spatial filtering (Laplacian around C3/C4), autoregressive model (order 16) for spectrum estimation,
  alpha power (12 Hz ± 1.5 Hz) for control signal. Horizontal motion controlled by lateralized alpha power (C4-C3), vertical
  motion by total alpha power (C4+C3). Control signals normalized to zero mean and unit variance. Cursor position updated
  every 40 ms.'
